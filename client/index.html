<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Farm Management Dashboard</title>
    <meta name="description" content="Manage your agricultural operations efficiently. Track crops, equipment, irrigation, soil health, and analytics in one comprehensive dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (() => {
        const storageKey = "farm-management-theme";
        const root = document.documentElement;
        const savedTheme = localStorage.getItem(storageKey) || "dark";

        root.classList.remove("light", "dark");

        if (savedTheme === "system") {
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          root.classList.add(systemTheme);
          return;
        }

        root.classList.add(savedTheme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
